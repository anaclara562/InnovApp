<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Inscrição</title>
    <link rel="stylesheet" href="/CSS/style_forms.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/gugi" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Formulário para Contato com a InnovApp</h1>
        <div class="texto-centralizado">
            <a href="#DadosPessoais"><button>Preencha seus Dados pessoais</button></a>
            <a href="index.html"><button>Voltar para o site principal</button></a>
        </div><br>
        <form action="#" method="post" enctype="multipart/form-data" autocomplete="on">
            <fieldset id="DadosPessoais">
                <div class="tit-gradiente">
                    <h2>Dados pessoais</h2>
                </div>
                <br>
                <div class="forms">
                    <label for="nome"><strong>Nome Completo</strong></label><br>
                    <input id="nome" name="nome" type="text" placeholder="Seu nome" required minlength="3" maxlength="60">
                    <small style="color: #666;">Escreva seu nome completo</small><br><br>

                    <strong>CPF</strong><br>
                    <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
                    <div id="mensagem-cpf"></div><br> 
                    
                    <strong>CEP</strong><br>
                    <input type="text" id="cep" maxlength="9" placeholder="00000-000"><br>
                    <div id="endereco" style="display: none;"></div><br>


                    <label for="Email"><strong>E-mail</strong></label><br>
                    <input id="Email" name="E-mail" type="email" placeholder="Seu Email" required minlength="3" maxlength="60"><br><br>

                    <label for="telefone"><strong>Telefone</strong></label><br>
                    <input id="telefone" name="telefone" type="text" placeholder="Seu telefone" required minlength="3" maxlength="60"><br><br>

                    <label for="mensagem"><strong>Mensagem</strong></label><br>
                    <textarea id="mensagem" name="mensagem" rows="4" placeholder="Escreva sua mensagem..."></textarea><br>
                    <small style="color: #666;">Mensagem (mín. 10 caracteres)</small><br>
                </div> 
            </fieldset> 
        </form>
    </div>
    <div class="luz_footer"></div>
    <footer>
        <div id="Redes_Sociais" class="social-icons">
            <img src="/HTML/images/images_social-media/linkedin.png" alt="Logo do Aplicativo Linkedin" width="57px" height="57px">
            <img src="/HTML/images/images_social-media/instagram.png" alt="Logo do Aplicativo Instagram" width="58px" height="58px">
            <img src="/HTML/images/images_social-media/figma.png" alt="Logo do Aplicativo Figma" width="58px" height="58px">
            <img src="/HTML/images/images_social-media/facebook.png" alt="Logo do Aplicativo Facebook" width="58px" height="58px">
            <img src="/HTML/images/images_social-media/whatsapp.png" alt="Logo do Aplicativo Whatsapp" width="58px" height="58px">
            <img src="/HTML/images/images_social-media/google.png" alt="Logo do Aplicativo Google" width="58px" height="58px">
            <img src="/HTML/images/images_social-media/youtube.png" alt="Logo do Aplicativo Youtube" width="58px" height="58px">
        </div>
    </footer>
</body>
</html>
</body>
</html>
